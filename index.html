    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #030712;
            overflow: hidden; /* ป้องกันการเลื่อนหน้าจอหลัก */
        }

        /* ================= NEON & ANIMATION EFFECT ================= */
        .glass-panel {
            background: rgba(9, 15, 30, 0.96);
            backdrop-filter: blur(20px);
            border-right: 2px solid #00ff99;
            box-shadow: 0 0 20px rgba(0, 255, 153, 0.15), 5px 0 25px rgba(0, 255, 153, 0.05);
            position: relative;
            z-index: 1001;
        }

        .radar-ring {
            position: absolute; top: 50%; left: 50%; border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .radar-1 { width: 160px; height: 160px; border: 1px dashed rgba(0, 255, 153, 0.15); animation: spin-ring 20s linear infinite; }
        .radar-2 { width: 128px; height: 128px; border: 1px solid rgba(0, 255, 153, 0.2); animation: pulse-ring 3s ease-in-out infinite; }
        .radar-3 { width: 96px; height: 96px; border: 2px dotted rgba(0, 255, 153, 0.3); animation: spin-ring-reverse 15s linear infinite; }
        .radar-4 { width: 64px; height: 64px; border: 1px dashed rgba(0, 255, 153, 0.4); animation: spin-ring 8s linear infinite; }

        @keyframes spin-ring { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes spin-ring-reverse { 0% { transform: translate(-50%, -50%) rotate(360deg); } 100% { transform: translate(-50%, -50%) rotate(0deg); } }
        @keyframes pulse-ring { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.3; } }

        .logo-box { animation: float-logo 4s ease-in-out infinite; }
        @keyframes float-logo { 0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(0,255,153,0.6)); } 50% { transform: translateY(-8px); filter: drop-shadow(0 0 20px rgba(0,255,153,1)); } }

        .queue-item-neon {
            background: rgba(30, 41, 59, 0.45);
            border: 1px solid rgba(0, 255, 153, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: slide-in-right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }
        .queue-item-neon:hover {
            border-color: #00ff99; box-shadow: -5px 0 15px rgba(0, 255, 153, 0.3); background: rgba(30, 41, 59, 0.8); transform: translateX(6px) scale(1.01) !important;
        }
        @keyframes slide-in-right { 0% { transform: translateX(-30px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }

        #village-stats-panel {
            background: rgba(7, 12, 24, 0.85) !important; backdrop-filter: blur(15px) !important; border: 1px solid #00f0ff !important;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.25), inset 0 0 10px rgba(0, 240, 255, 0.1) !important; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #village-stats-panel:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0, 240, 255, 0.4), inset 0 0 15px rgba(0, 240, 255, 0.2) !important; }

        .map-crosshair {
            position: absolute; top: 50%; left: 50%; width: 32px; height: 32px; margin-left: -16px; margin-top: -16px; z-index: 2000; pointer-events: none; animation: crosshair-breathe 2s infinite ease-in-out;
        }
        .map-crosshair::before, .map-crosshair::after { content: ''; position: absolute; background: #00ff99; box-shadow: 0 0 10px #00ff99; }
        .map-crosshair::before { top: 15px; left: 0; width: 100%; height: 2px; }
        .map-crosshair::after { left: 15px; top: 0; width: 2px; height: 100%; }
        @keyframes crosshair-breathe { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.3); opacity: 1; } }

        .neon-text-green { color: #fff; text-shadow: 0 0 5px #00ff99, 0 0 12px rgba(0, 255, 153, 0.6); }
        .neon-text-amber { color: #fff; text-shadow: 0 0 5px #f59e0b, 0 0 12px rgba(245, 158, 11, 0.6); }
        .neon-text-cyan { text-shadow: 0 0 6px rgba(0, 240, 255, 0.6); }
        .neon-text-emerald { text-shadow: 0 0 8px rgba(16, 185, 129, 0.8); }

        .btn-neon-start {
            background: rgba(0, 255, 153, 0.1); border: 2px solid #00ff99; color: #00ff99; text-shadow: 0 0 4px rgba(0, 255, 153, 0.6);
            animation: neon-pulse-emerald 2.5s infinite ease-in-out; transition: all 0.3s;
        }
        .btn-neon-start:hover { background: #00ff99; color: #030712; box-shadow: 0 0 25px #00ff99; text-shadow: none; transform: scale(1.02); }
        @keyframes neon-pulse-emerald {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 153, 0.4), inset 0 0 5px rgba(0, 255, 153, 0.2); border-color: rgba(0, 255, 153, 0.6); }
            50% { box-shadow: 0 0 22px rgba(0, 255, 153, 0.85), inset 0 0 12px rgba(0, 255, 153, 0.4); border-color: rgba(0, 255, 153, 1); }
        }

        .neon-input:focus { border-color: #00ff99 !important; box-shadow: 0 0 12px rgba(0, 255, 153, 0.4) !important; transform: scale(1.01); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        .custom-scroll::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #00ff99, #3b82f6); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #00ff99; box-shadow: 0 0 8px #00ff99; }

        #resizer { width: 4px; cursor: col-resize; background: #070b14; transition: background 0.3s; z-index: 1005; }
        #resizer:hover { background: #00ff99; box-shadow: 0 0 10px #00ff99; }
        body.resizing { cursor: col-resize; user-select: none; }

        .grid-collapsed { grid-template-rows: 0fr !important; margin-top: 0 !important; opacity: 0 !important; pointer-events: none; }
        .leaflet-routing-container { display: none !important; }
        
        .house-number-label {
            background: rgba(5, 10, 20, 0.9) !important; backdrop-filter: blur(4px) !important;        
            border: 1.5px solid #00ff99 !important; border-radius: 6px !important; color: #ffffff !important;
            font-weight: 900 !important; font-size: 13px !important; padding: 3px 10px !important; white-space: nowrap !important;
            box-shadow: 0 0 15px rgba(0, 255, 153, 0.5) !important; text-shadow: 0 0 3px rgba(0,255,153,0.5) !important; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); animation: map-pop 0.4s ease-out;
        }
        @keyframes map-pop { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .house-number-label:hover { transform: scale(1.15) translateY(-5px); border-color: #34d399 !important; box-shadow: 0 10px 25px rgba(52, 211, 153, 0.8) !important; }
        .leaflet-tooltip-top:before, .leaflet-tooltip-bottom:before { display: none !important; }
        .sortable-ghost { opacity: 0.3; background: #00ff99 !important; border-color: #00ff99 !important; transform: scale(0.95); }

        body.hide-map-labels .toggleable-label-text { display: none !important; }

        .leaflet-bar { border: none !important; box-shadow: 0 4px 10px rgba(0,0,0,0.6) !important; }
        .leaflet-bar a { background-color: #1e293b !important; color: #cbd5e1 !important; border-bottom: 1px solid #334155 !important; }
        .leaflet-bar a:hover { background-color: #334155 !important; color: #fff !important; }

        .delivery-hidden { display: none !important; }

        #mobile-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.7); z-index: 2000; opacity: 0; transition: opacity 0.3s ease;
        }
        #mobile-overlay.active { display: block; opacity: 1; }
        
        .leaflet-control-zoom { margin-bottom: 20px !important; }

        .gps-user-dot {
            background-color: #3b82f6; border: 3px solid #ffffff; border-radius: 50%; box-shadow: 0 0 15px rgba(59, 130, 246, 0.8);
            animation: pulse-gps 1.5s infinite ease-out;
        }
        @keyframes pulse-gps {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .custom-scrollbar::-webkit-scrollbar {
    width: 4px;
}
.custom-scrollbar::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.1);
}
.custom-scrollbar::-webkit-scrollbar-thumb {
    background: rgba(16, 185, 129, 0.3);
    border-radius: 4px;
}
.custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background: rgba(16, 185, 129, 0.6);
}

        
    </style>
</head>

// ===================== ROAD-DISTANCE ROUTE OPTIMIZER (OSRM) =====================

// ดึง distance matrix จาก OSRM จริง (ระยะทางตามถนน)
async function fetchOSRMDistanceMatrix(houses) {
    const coords = houses.map(h => `${h.lng},${h.lat}`).join(';');
    const url = `https://router.project-osrm.org/table/v1/driving/${coords}?annotations=distance`;
    
    try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.code === 'Ok') {
    console.log('OSRM Matrix:', JSON.stringify(data.distances));
    console.log('Houses order:', houses.map(h => h.id));
    return data.distances;
}
    } catch (e) {
        console.warn('OSRM matrix failed, fallback to Haversine:', e);
    }
    return null;
}

// Nearest Neighbor ใช้ matrix ที่ได้จาก OSRM
function buildRouteFromMatrix(matrix, houses) {
    const n = houses.length;

    function nnRoute(startIdx) {
        const visited = new Array(n).fill(false);
        const route = [startIdx];
        visited[startIdx] = true;
        let current = startIdx;
        for (let step = 1; step < n; step++) {
            let nearestIdx = -1, minDist = Infinity;
            for (let j = 0; j < n; j++) {
                if (!visited[j] && matrix[current][j] < minDist) {
                    minDist = matrix[current][j];
                    nearestIdx = j;
                }
            }
            visited[nearestIdx] = true;
            route.push(nearestIdx);
            current = nearestIdx;
        }
        return route;
    }

    function routeDist(route) {
        let total = 0;
        for (let i = 0; i < route.length - 1; i++) {
            total += matrix[route[i]][route[i + 1]];
        }
        return total;
    }

    // หา route ที่ดีที่สุดจากทุก start
    // Score = ระยะรวม + penalty ถ้าจุดสุดท้ายอยู่ใกล้จุดแรกมาก (แปลว่าย้อนกลับ)
    let bestRoute = null, bestScore = Infinity;
    for (let i = 0; i < n; i++) {
        const r = nnRoute(i);
        const dist = routeDist(r);
        // penalty: ถ้าจุดสุดท้ายใกล้จุดเริ่มมาก = route วนกลับ = ไม่ดี
        const lastToFirst = matrix[r[n-1]][r[0]];
        const penalty = lastToFirst < dist * 0.3 ? dist * 0.5 : 0;
        const score = dist + penalty;
        if (score < bestScore) {
            bestScore = score;
            bestRoute = r;
        }
    }

    return bestRoute.map(i => houses[i]);
}

function buildRouteFromMatrixWithDepot(matrix, houses) {
    // matrix มี depot ที่ index 0, บ้านอยู่ที่ index 1..n
    const n = houses.length;

    // หาบ้านที่ใกล้ depot มากที่สุด → เป็นจุดแรก
    let firstIdx = 0;
    let minDistFromDepot = Infinity;
    for (let j = 1; j <= n; j++) {
        if (matrix[0][j] < minDistFromDepot) {
            minDistFromDepot = matrix[0][j];
            firstIdx = j - 1; // index ใน houses array (ลบ 1 เพราะ depot อยู่ที่ 0)
        }
    }

    // Nearest Neighbor จากจุดแรกที่ได้
    // ใช้ submatrix ของบ้านเท่านั้น (index 1..n ใน matrix)
    const visited = new Array(n).fill(false);
    const route = [firstIdx];
    visited[firstIdx] = true;
    let current = firstIdx;

    for (let step = 1; step < n; step++) {
        let nearestIdx = -1, minDist = Infinity;
        for (let j = 0; j < n; j++) {
            if (!visited[j]) {
                // matrix index ของบ้านคือ j+1 (เพราะ depot อยู่ที่ 0)
                const dist = matrix[current + 1][j + 1];
                if (dist < minDist) {
                    minDist = dist;
                    nearestIdx = j;
                }
            }
        }
        visited[nearestIdx] = true;
        route.push(nearestIdx);
        current = nearestIdx;
    }

    return route.map(i => houses[i]);
}

// Haversine fallback (กรณี OSRM ล้ม)
function calcDistance(a, b) {
    const R = 6371;
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLng = (b.lng - a.lng) * Math.PI / 180;
    const sinDLat = Math.sin(dLat / 2);
    const sinDLng = Math.sin(dLng / 2);
    const aVal = sinDLat * sinDLat +
        Math.cos(a.lat * Math.PI / 180) * Math.cos(b.lat * Math.PI / 180) *
        sinDLng * sinDLng;
    return R * 2 * Math.atan2(Math.sqrt(aVal), Math.sqrt(1 - aVal));
}

function optimizeRouteNearestNeighbor(houses) {
    if (houses.length <= 2) return [...houses];

    function buildRoute(startIdx, list) {
        const unvisited = [...list];
        const route = [];
        let current = unvisited.splice(startIdx, 1)[0];
        route.push(current);
        while (unvisited.length > 0) {
            let nearestIdx = 0;
            let minDist = calcDistance(current, unvisited[0]);
            for (let i = 1; i < unvisited.length; i++) {
                const d = calcDistance(current, unvisited[i]);
                if (d < minDist) { minDist = d; nearestIdx = i; }
            }
            current = unvisited.splice(nearestIdx, 1)[0];
            route.push(current);
        }
        return route;
    }

    function totalDist(route) {
        let total = 0;
        for (let i = 0; i < route.length - 1; i++) {
            total += calcDistance(route[i], route[i + 1]);
        }
        return total;
    }

    let bestRoute = null, bestDist = Infinity;
    for (let i = 0; i < houses.length; i++) {
        const route = buildRoute(i, houses);
        const dist = totalDist(route);
        if (dist < bestDist) { bestDist = dist; bestRoute = route; }
    }

    return bestRoute;
}

function detectRoadBranch(house, junctionLat, junctionLng) {

    const latDiff = house.lat - junctionLat;
    const lngDiff = house.lng - junctionLng;

    // =========================
    // แนวถนน
    // =========================

    // ขึ้น
    if (
        Math.abs(latDiff) > Math.abs(lngDiff)
    ) {

        return latDiff > 0
            ? 'north'
            : 'south';
    }

    // ซ้ายขวา
    return lngDiff > 0
        ? 'east'
        : 'west';
}

async function optimizeRouteForward(houses) {

    if (houses.length <= 1) return houses;

    // =========================
    // เริ่มจากจุดล่างสุด
    // =========================
    let startIndex = 0;

    for (let i = 1; i < houses.length; i++) {

        if (houses[i].lat < houses[startIndex].lat) {
            startIndex = i;
        }
    }

    const route = [];

    const unvisited = [...houses];

    let current = unvisited.splice(startIndex, 1)[0];

    route.push(current);

    // =========================
    // ไล่ตามถนนจริง
    // =========================
    while (unvisited.length > 0) {

        let bestIndex = -1;

        let bestScore = Infinity;

        for (let i = 0; i < unvisited.length; i++) {

            const next = unvisited[i];

            try {

                // -------------------------
                // OSRM route
                // -------------------------
                const url =
                    `https://router.project-osrm.org/route/v1/driving/` +
                    `${current.lng},${current.lat};` +
                    `${next.lng},${next.lat}` +
                    `?overview=false`;

                const res = await fetch(url);

                const data = await res.json();

                if (data.code !== 'Ok') continue;

                const roadDistance =
                    data.routes[0].distance;

                    let intersectionPenalty = 0;

try {

    const steps =
        data.routes[0].legs[0].steps || [];

    // จำนวนการเลี้ยว
    let turnCount = 0;

    // จำนวน intersection
    let intersectionCount = 0;

    for (const step of steps) {

        // --------------------
        // เช็ค maneuver
        // --------------------
        const type =
            step.maneuver?.type || '';

        const modifier =
            step.maneuver?.modifier || '';

        // --------------------
        // ถ้าเป็นการเลี้ยว
        // --------------------
        if (
            modifier.includes('left') ||
            modifier.includes('right')
        ) {

            turnCount++;
        }

        // --------------------
        // เช็ค intersection
        // --------------------
        if (step.intersections) {

            for (const inter of step.intersections) {

                const roads =
                    inter.bearings?.length || 0;

                // 3 แยกขึ้นไป
                if (roads >= 3) {

                    intersectionCount++;
                }
            }
        }
    }

    // --------------------
    // ค่าปรับ
    // --------------------

    // เลี้ยวเยอะ = penalty
    intersectionPenalty +=
        turnCount * 120;

    // 3แยก 4แยก 5แยก = penalty
    intersectionPenalty +=
        intersectionCount * 250;

} catch (e) {

    console.log(
        'intersection check failed',
        e
    );
}

                // -------------------------
                // คำนวณทิศทาง
                // -------------------------
                const latDiff =
                    next.lat - current.lat;

                const lngDiff =
                    next.lng - current.lng;

                // -------------------------
                // ห้ามย้อนกลับแรง ๆ
                // -------------------------
                const backwardPenalty =
                    (latDiff < -0.0003 || lngDiff < -0.0003)
                    ? 999999
                    : 0;

                // -------------------------
                // score สุดท้าย
                // -------------------------
                const score =
    roadDistance +
    backwardPenalty +
    intersectionPenalty;

                if (score < bestScore) {

                    bestScore = score;

                    bestIndex = i;
                }

            } catch (e) {

                console.log(e);
            }
        }

        // fallback
        if (bestIndex === -1) {
            bestIndex = 0;
        }

        current =
            unvisited.splice(bestIndex, 1)[0];

        route.push(current);
    }

    return route;
}

async function checkAndDrawSegment(from, to, straightDist) {
    const url = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.code === 'Ok') {
            const roadDist = data.routes[0].distance / 1000; // km
            const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

            // ถ้าอ้อมเกิน 3.5 เท่าของเส้นตรง = เส้นประ
            // ถ้าถนนอ้อมเกินเส้นตรงมากกว่า 800 เมตร = เส้นประ
const detour = (roadDist - straightDist) * 1000; // แปลงเป็นเมตร
console.log(`${from.id} → ${to.id} | เส้นตรง: ${(straightDist*1000).toFixed(0)}m | ถนนจริง: ${(roadDist*1000).toFixed(0)}m | อ้อม: ${detour.toFixed(0)}m`);
const isDashed = detour > 2000;
console.log(`isDashed: ${isDashed}, detour: ${detour.toFixed(0)}m → วาด${isDashed ? 'เส้นประ' : 'เส้นทึบ'}`);

            if (isDashed) {
                // เส้นตัดปะ — วาดเส้นตรงระหว่าง 2 จุด
                const dashed = L.polyline([[from.lat, from.lng], [to.lat, to.lng]], {
                    color: '#00ff99',
                    weight: 3,
                    opacity: 0.8,
                    dashArray: '10, 10'
                }).addTo(map);
                window.straightLines.push(dashed);
            } else {
                // เส้นทึบ — วาดตามถนนจริง
                const solid = L.polyline(coords, {
                    color: '#005533', weight: 12, opacity: 0.4
                }).addTo(map);
                const solid2 = L.polyline(coords, {
                    color: '#00ff99', weight: 5, opacity: 0.9
                }).addTo(map);
                window.straightLines.push(solid, solid2);
            }
        }
    } catch (e) {
        // fallback เส้นประ
        const dashed = L.polyline([[from.lat, from.lng], [to.lat, to.lng]], {
            color: '#00ff99', weight: 3, opacity: 0.8, dashArray: '10, 10'
        }).addTo(map);
        window.straightLines.push(dashed);
    }
}

            const statsContainer = document.getElementById("village-stats-list");
            statsContainer.innerHTML = ""; 
            villages.forEach((v, index) => {
                const villageHouses = allHouses.filter(h => h.village === v.code.toLowerCase());
                const count = villageHouses.length;
                const item = document.createElement("div");
                
                item.className = "flex justify-between items-center bg-transparent py-2 border-b border-white/5 cursor-pointer hover:bg-white/10 px-2 transition-all hover:translate-x-1 rounded group";
                item.innerHTML = `
                    <span class="text-slate-300 text-[12px] font-medium group-hover:text-white transition-colors">${index + 1}.) ${v.name}</span>
                    <span class="bg-[#00f0ff]/20 text-[#00f0ff] border border-[#00f0ff]/40 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-[0_0_8px_rgba(0,240,255,0.2)] group-hover:scale-110">${count}</span>
                `;
                item.onclick = () => {
                    const filtered = allHouses.filter(h => h.village === v.code.toLowerCase());
                    plotMarkers(filtered, true);
                    if (filtered.length > 0) map.fitBounds(L.latLngBounds(filtered.map(h => [h.lat, h.lng])), { padding: [20, 20], maxZoom: 18 });
                };
                statsContainer.appendChild(item);
            });
            
            const resetBtn = document.createElement("div");
            resetBtn.className = "mt-2 w-full bg-[#111827] border border-blue-500/40 text-blue-400 hover:bg-blue-950/50 py-1.5 rounded-md text-[11px] font-bold flex items-center justify-center gap-2 cursor-pointer shadow-sm";
            resetBtn.innerHTML = '<i class="fa-solid fa-arrows-rotate"></i> แสดงบ้านทั้งหมด';
            resetBtn.onclick = () => { plotMarkers(null, false); map.setView([14.41, 101.70], 13); };
            statsContainer.appendChild(resetBtn);
        }

        function toggleVillageStats() {
            const wrapper = document.getElementById('stats-grid-wrapper');
            const icon = document.getElementById('toggle-icon');
            if (wrapper.classList.contains('grid-collapsed')) {
                wrapper.classList.remove('grid-collapsed');
                icon.style.transform = "rotate(0deg)";
            } else {
                wrapper.classList.add('grid-collapsed');
                icon.style.transform = "rotate(180deg)";
            }
        }

        // ================= ฟังก์ชันเริ่มจัดส่งพร้อม Loading =================
        function validateAndStartDelivery() {
            if (!deliveryQueue || deliveryQueue.length === 0) {
                Swal.fire({ 
                    icon: 'warning', title: 'ยังไม่ได้เลือกคิวจัดส่ง', text: 'กรุณาเพิ่มบ้านเข้าคิวก่อนครับ', 
                    confirmButtonColor: '#00ff99', background: '#0f172a', color: '#fff' 
                });
                return;
            }

            const loader = document.getElementById('delivery-loader-overlay');
            const bar = document.getElementById('delivery-loader-bar');
            
            if (loader && bar) {
                loader.classList.remove('opacity-0', 'pointer-events-none');
                loader.classList.add('opacity-100');
                
                bar.style.width = '0%';
                setTimeout(() => { bar.style.width = '100%'; }, 100);

                setTimeout(() => {
                    loader.classList.remove('opacity-100');
                    loader.classList.add('opacity-0', 'pointer-events-none');
                    startDeliveryMode(); 
                }, 2500);
            } else {
                startDeliveryMode();
            }
        }

        function startDeliveryMode() {
            const sidebar = document.getElementById('main-sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if (sidebar && window.innerWidth < 768) {
                sidebar.classList.add('-translate-x-full');
                if (overlay) overlay.classList.remove('active');
            }

            ['main-sidebar', 'resizer', 'village-stats-panel', 'btn-mobile-menu', 'layer-toggle-btn'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('delivery-hidden');
            });
            
            const exitBtn = document.getElementById('exit-full-mode');
            if (exitBtn) exitBtn.style.setProperty('display', 'flex', 'important');

            // โชว์แผงจัดส่งและอัปเดตข้อมูลบ้านหลังแรก
            document.getElementById('delivery-status-card').classList.remove('hidden');
            updateDeliveryCard();

            setTimeout(() => { if(map) map.invalidateSize(); }, 300);
        }

        // 1. ค้นหาฟังก์ชันที่ใช้โหลดไฟล์ KML (ชื่ออาจเป็น handleFileSelect หรือ handleKML)
function handleFileSelect(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const kmlText = e.target.result;
            
            // ... (โค้ดเดิมของคุณที่ใช้ดึงข้อมูลจาก KML ใส่ deliveryQueue) ...
            
            // เมื่อโหลดเสร็จแล้ว ให้เพิ่ม 2 บรรทัดนี้ไว้ท้ายสุดของ reader.onload
            currentQueueIndex = 0;      // บังคับให้เริ่มที่จุดที่ 1
            renderTopLeftQueue();       // สั่งให้แสดงรายชื่อที่มุมบนซ้ายทันที
        };
        reader.readAsText(file);
    }
}

        function exitDeliveryMode() {
            ['main-sidebar', 'resizer', 'village-stats-panel', 'btn-mobile-menu', 'layer-toggle-btn'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('delivery-hidden');
            });
            
            const exitBtn = document.getElementById('exit-full-mode');
            if (exitBtn) exitBtn.style.setProperty('display', 'none', 'important');

            // ซ่อนแผงจัดส่ง
            document.getElementById('delivery-status-card').classList.add('hidden');

            setTimeout(() => { if(map) map.invalidateSize(); }, 300);
        }

        // ================= อัปเดตข้อมูลเป้าหมายบนแผง =================
        // ฟังก์ชันอัปเดตหน้าจอ Card
function updateDeliveryCard() {
    const card = document.getElementById('delivery-status-card');
    
    // ถ้าไม่มีข้อมูลในคิว ให้ซ่อน Card
    if (!deliveryQueue || deliveryQueue.length === 0) {
        card.classList.add('hidden');
        return;
    }

    card.classList.remove('hidden');
    
    // ดึงข้อมูลลำดับปัจจุบันมาโชว์
    const target = deliveryQueue[currentQueueIndex];
    
    // --- จุดที่แก้ไข: การดึงชื่อและเลขที่บ้าน ---
    // ลองดึงจาก id หรือ name หรือ featureName (ตามมาตรฐาน KML)
    const houseNo = target.id || target.name || target.featureName || "ไม่พบเลขที่";
    const village = target.village || target.description || "ไม่พบหมู่บ้าน";

    // อัปเดตข้อมูลลง UI
    document.getElementById('target-house').innerText = houseNo;
    document.getElementById('target-village').innerText = village;
    
    // อัปเดตตัวเลขคิว (เช่น 1/11)
    const queueNum = document.getElementById('queue-number');
    if (queueNum) {
        queueNum.innerText = `${currentQueueIndex + 1}/${deliveryQueue.length}`;
    }

    // สั่งแผนที่ให้เคลื่อนไป (ใช้ชื่อตัวแปรแผนที่ตามใน index.html ของคุณ)
    if (map && target.lat && target.lng) {
        map.flyTo([target.lat, target.lng], 18, {
            animate: true,
            duration: 1.5
        });
    }
}

// ฟังก์ชันเลื่อนไปอันถัดไป
function nextQueue() {
    if (currentQueueIndex < deliveryQueue.length - 1) {
        currentQueueIndex++;
        updateDeliveryCard();
    }
}

// ฟังก์ชันเลื่อนกลับไปอันก่อนหน้า
function prevQueue() {
    if (currentQueueIndex > 0) {
        currentQueueIndex--;
        updateDeliveryCard();
    }
}

// เมื่อกดส่งสำเร็จ
// ================= เมื่อกดปุ่ม "จัดส่งสำเร็จแล้ว" =================

                // ================= ระบบปรับขนาด Card (Size Control) =================
        let currentCardScale = 1.0;
        
        function changeCardSize(step) {
            currentCardScale += step;
            
            // จำกัดขนาดไม่ให้เล็กเกินไป (60%) หรือใหญ่เกินไป (130%)
            if (currentCardScale < 0.6) currentCardScale = 0.6;
            if (currentCardScale > 1.3) currentCardScale = 1.3;
            
            // อัปเดตขนาด
            const innerCard = document.getElementById('delivery-card-inner');
            if (innerCard) {
                // ปัดเศษทศนิยมเพื่อความแม่นยำ
                currentCardScale = Math.round(currentCardScale * 10) / 10;
                innerCard.style.transform = `scale(${currentCardScale})`;
            }
        }

        // ================= เมื่อกดปุ่ม "จัดส่งสำเร็จแล้ว" =================
        // ค้นหาฟังก์ชัน completeCurrentDelivery เดิมแล้วแทนที่ด้วยอันนี้
function completeCurrentDelivery() {
    if (deliveryQueue.length > 0 && currentQueueIndex < deliveryQueue.length) {
        
        // 1. Mark ว่าส่งแล้ว (เลข Index เดิมจะไม่หายไปไหน)
        deliveryQueue[currentQueueIndex].isCompleted = true;

        // 2. แจ้งเตือน
        Swal.fire({
            toast: true, position: 'top-end', icon: 'success',
            title: `ส่งสำเร็จ: จุดที่ ${currentQueueIndex + 1}`,
            showConfirmButton: false, timer: 1500, background: '#042f22', color: '#00ff99'
        });

        // 3. หาจุดถัดไปที่ยังไม่สำเร็จ
        let nextIdx = -1;
        for (let i = currentQueueIndex + 1; i < deliveryQueue.length; i++) {
            if (!deliveryQueue[i].isCompleted) { nextIdx = i; break; }
        }

        if (nextIdx !== -1) {
            currentQueueIndex = nextIdx;
            updateDeliveryCard(); // แผนที่บินไปจุดถัดไป
        } else {
            // ถ้าไม่เจอข้างหน้า ลองหาจุดแรกๆ ที่อาจจะข้ามมา
            let backIdx = deliveryQueue.findIndex(item => !item.isCompleted);
            if (backIdx !== -1) {
                currentQueueIndex = backIdx;
                updateDeliveryCard();
            } else {
                document.getElementById('delivery-status-card').classList.add('hidden');
                Swal.fire('สำเร็จ!', 'ส่งครบทุกจุดแล้ว', 'success');
            }
        }

        // 4. อัปเดตรายการบนซ้ายให้จุดที่ส่งแล้วหายไป
        renderTopLeftQueue();
        
        if (navigator.vibrate) navigator.vibrate(100);
    }
}

        // ================= ฟังก์ชันแสดงผลคิวส่งของมุมบนซ้าย =================
function renderTopLeftQueue() {
    const panel = document.getElementById('queue-list-panel');
    const container = document.getElementById('queue-items-container');
    const totalCount = document.getElementById('queue-total-count');
    
    // ถ้าไม่มีข้อมูลในคิวเลย ให้ซ่อนแผงนี้ไป
    if (!deliveryQueue || deliveryQueue.length === 0) {
        panel.classList.add('hidden');
        return;
    }
    
    panel.classList.remove('hidden');
    
    // นับจำนวนจุดที่ยังไม่ได้ส่งสำเร็จ
    const remaining = deliveryQueue.filter(item => !item.isCompleted).length;
    totalCount.innerText = `เหลือ ${remaining} จุด`;
    
    // วนลูปสร้าง UI รายชื่อบ้าน
    container.innerHTML = deliveryQueue.map((item, index) => {
        // เงื่อนไขสำคัญ: ถ้าส่งสำเร็จแล้ว ให้หายไปเลย (คืนค่าว่าง) โดยไม่ต้องจัดลำดับ index ใหม่
        if (item.isCompleted) return '';
        
        // เช็คว่าใช่จุดที่กำลังจะไปส่งปัจจุบันไหม
        const isActive = (index === currentQueueIndex);
        
        return `
            <div onclick="jumpToQueueIndex(${index})" class="flex items-center justify-between p-2 rounded-xl cursor-pointer transition-all border ${
                isActive 
                ? 'bg-emerald-500/10 border-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.2)]' 
                : 'bg-black/30 border-white/5 hover:border-emerald-500/40 hover:bg-black/50'
            }">
                <div class="flex flex-col min-w-0 pr-2">
                    <span class="text-[12px] font-bold ${isActive ? 'text-emerald-400' : 'text-slate-200'}">
                        จุดที่ ${index + 1}: ${item.id || item.name || 'ไม่ทราบเลขที่'}
                    </span>
                    <span class="text-[10px] text-slate-400 truncate">
                        ${item.village || item.description || ''}
                    </span>
                </div>
                ${isActive ? '<span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shrink-0 shadow-[0_0_8px_#10b981]"></span>' : ''}
            </div>
        `;
    }).join('');
}

// ฟังก์ชันสำหรับกดที่รายชื่อเพื่อกระโดดข้ามไปดูจุดนั้นบนแผนที่ได้ทันที
function jumpToQueueIndex(index) {
    if (index >= 0 && index < deliveryQueue.length && !deliveryQueue[index].isCompleted) {
        currentQueueIndex = index;
        updateDeliveryCard(); // อัปเดตการ์ดล่างและบินแผนที่ไป
        renderTopLeftQueue();  // รีเฟรชไฮไลท์สีเขียวบนรายการ
    }
}

        loadKMLFile();

    </script>
